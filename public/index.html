<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGI - CIRNSAS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f4f4; }

        header {
            background: #1a3a5c;
            color: white;
            padding: 16px 32px;
            font-size: 20px;
            font-weight: bold;
        }

        .container { padding: 32px; }

        h2 { color: #1a3a5c; margin-bottom: 16px; }

        .filtros {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filtros button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #ddd;
            font-size: 14px;
        }

        .filtros button.activo { background: #1a3a5c; color: white; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        th {
            background: #1a3a5c;
            color: white;
            padding: 12px 16px;
            text-align: left;
            font-size: 14px;
        }

        td { padding: 12px 16px; border-bottom: 1px solid #eee; font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #f9f9f9; }

        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge.Disponible { background: #d4edda; color: #155724; }
        .badge.Reservado { background: #fff3cd; color: #856404; }
        .badge.En-promesa { background: #ffe0b2; color: #e65100; }
        .badge.Escriturado { background: #f8d7da; color: #721c24; }

        select {
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }

        .btn-agregar {
            background: #1a3a5c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .btn-agregar:hover { background: #2e5f8a; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.activo { display: flex; }

        .modal {
            background: white;
            padding: 32px;
            border-radius: 10px;
            width: 460px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .modal h3 { color: #1a3a5c; margin-bottom: 20px; }

        .form-group { margin-bottom: 16px; }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        .modal-botones {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn-cancelar {
            padding: 8px 16px;
            border: 1px solid #ccc;
            background: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-guardar {
            padding: 8px 16px;
            background: #1a3a5c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-guardar:hover { background: #2e5f8a; }
    </style>
</head>
<body>

<header>SGI - CIRNSAS | Gestión de Apartamentos</header>

<div class="container">
    <h2>Inventario de Apartamentos</h2>

    <div class="filtros">
        <button class="activo" onclick="filtrar('Todos')">Todos</button>
        <button onclick="filtrar('Disponible')">Disponible</button>
        <button onclick="filtrar('Reservado')">Reservado</button>
        <button onclick="filtrar('En promesa de compra')">En promesa</button>
        <button onclick="filtrar('Escriturado')">Escriturado</button>
    </div>

    <button class="btn-agregar" onclick="abrirModal()">+ Agregar Apartamento</button>

    <table>
        <thead>
            <tr>
                <th>Número</th>
                <th>Piso</th>
                <th>Área (m²)</th>
                <th>Precio</th>
                <th>Acabados</th>
                <th>Estado</th>
                <th>Cambiar Estado</th>
            </tr>
        </thead>
        <tbody id="tabla-body"></tbody>
    </table>
</div>

<!-- Modal agregar apartamento -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <h3>Agregar Apartamento</h3>
        <div class="form-group">
            <label>Número de apartamento</label>
            <input type="text" id="numero" placeholder="Ej: 301">
        </div>
        <div class="form-group">
            <label>Piso</label>
            <input type="number" id="piso" placeholder="Ej: 3">
        </div>
        <div class="form-group">
            <label>Área (m²)</label>
            <input type="number" id="area" placeholder="Ej: 75.5">
        </div>
        <div class="form-group">
            <label>Precio</label>
            <input type="number" id="precio" placeholder="Ej: 250000000">
        </div>
        <div class="form-group">
            <label>Acabados</label>
            <input type="text" id="acabados" placeholder="Ej: Estándar, Premium">
        </div>
        <div class="modal-botones">
            <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
            <button class="btn-guardar" onclick="guardarApartamento()">Guardar</button>
        </div>
    </div>
</div>

<script>
    let apartamentos = [];
    let filtroActual = 'Todos';

    async function cargarApartamentos() {
        const res = await fetch('/apartamentos');
        apartamentos = await res.json();
        renderTabla();
    }

    function renderTabla() {
        const tbody = document.getElementById('tabla-body');
        const filtrados = filtroActual === 'Todos'
            ? apartamentos
            : apartamentos.filter(a => a.estado === filtroActual);

        tbody.innerHTML = filtrados.map(a => `
            <tr>
                <td>${a.numero}</td>
                <td>${a.piso}</td>
                <td>${a.area}</td>
                <td>$${Number(a.precio).toLocaleString('es-CO')}</td>
                <td>${a.acabados || '-'}</td>
                <td><span class="badge ${a.estado.replace(/ /g, '-')}">${a.estado}</span></td>
                <td>
                    <select onchange="cambiarEstado(${a.id}, this.value)">
                        <option value="Disponible" ${a.estado === 'Disponible' ? 'selected' : ''}>Disponible</option>
                        <option value="Reservado" ${a.estado === 'Reservado' ? 'selected' : ''}>Reservado</option>
                        <option value="En promesa de compra" ${a.estado === 'En promesa de compra' ? 'selected' : ''}>En promesa</option>
                        <option value="Escriturado" ${a.estado === 'Escriturado' ? 'selected' : ''}>Escriturado</option>
                    </select>
                </td>
            </tr>
        `).join('');
    }

    function filtrar(estado) {
        filtroActual = estado;
        document.querySelectorAll('.filtros button').forEach(b => b.classList.remove('activo'));
        event.target.classList.add('activo');
        renderTabla();
    }

    async function cambiarEstado(id, nuevoEstado) {
        await fetch(`/apartamentos/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ estado: nuevoEstado })
        });
        cargarApartamentos();
    }

    function abrirModal() {
        document.getElementById('modal').classList.add('activo');
    }

    function cerrarModal() {
        document.getElementById('modal').classList.remove('activo');
        document.getElementById('numero').value = '';
        document.getElementById('piso').value = '';
        document.getElementById('area').value = '';
        document.getElementById('precio').value = '';
        document.getElementById('acabados').value = '';
    }

    async function guardarApartamento() {
        const numero = document.getElementById('numero').value;
        const piso = document.getElementById('piso').value;
        const area = document.getElementById('area').value;
        const precio = document.getElementById('precio').value;
        const acabados = document.getElementById('acabados').value;

        if (!numero || !piso || !area || !precio) {
            alert('Por favor completa todos los campos obligatorios');
            return;
        }

        await fetch('/apartamentos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ numero, piso, area, precio, acabados })
        });

        cerrarModal();
        cargarApartamentos();
    }

    cargarApartamentos();
</script>

</body>
</html>
